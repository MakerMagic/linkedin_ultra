<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn CRM — Синхронизация</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="app">
      <aside class="nav" aria-label="Основная навигация">
        <div class="nav__brand">
          <span class="nav__logo" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v4" />
              <path d="m16.2 7.8 2.9-2.9" />
              <path d="M18 12h4" />
              <path d="m16.2 16.2 2.9 2.9" />
              <path d="M12 18v4" />
              <path d="m4.9 19.1 2.9-2.9" />
              <path d="M2 12h4" />
              <path d="m4.9 4.9 2.9 2.9" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </span>
          <span class="nav__title">LinkedIn CRM</span>
        </div>

        <nav class="nav__list">
          <button type="button" class="nav__item nav__item--active" data-nav="sync" disabled>
            <svg class="nav__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
              <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
              <path d="M16 16h5v5" />
            </svg>
            Синхронизация
          </button>
          <button type="button" class="nav__item nav__item--soon" data-nav="contacts" disabled title="Следующий этап">
            <svg class="nav__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Контакты
            <span class="nav__badge">скоро</span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <header class="main__header">
          <h1 class="main__h1">Синхронизация</h1>
          <p class="main__sub">Интерфейс этапа 2; отправка на FastAPI будет на следующих шагах.</p>
        </header>

        <section class="glass card" aria-labelledby="sync-card-title">
          <h2 id="sync-card-title" class="card__title">Состояние</h2>

          <div class="sync-layout">
            <div class="progress-ring" aria-hidden="true">
              <svg class="progress-ring__svg" viewBox="0 0 120 120">
                <defs>
                  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#6366f1" />
                    <stop offset="100%" stop-color="#8b5cf6" />
                  </linearGradient>
                </defs>
                <circle class="progress-ring__track" cx="60" cy="60" r="52" />
                <circle id="progressArc" class="progress-ring__fill" cx="60" cy="60" r="52" />
              </svg>
              <div class="progress-ring__label">
                <span id="progressPercent" class="progress-ring__value">0</span><span class="progress-ring__pct">%</span>
              </div>
            </div>

            <div class="sync-meta">
              <p id="syncStatus" class="sync-status">Ожидание запуска</p>
              <div class="sync-actions">
                <button type="button" id="btnStart" class="btn btn--primary">Начать синхронизацию</button>
                <button type="button" id="btnStop" class="btn btn--ghost" disabled>Остановить</button>
              </div>
              <p class="sync-hint">Логику сбора и синхронизации на этом шаге не реализуем — только UI.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
